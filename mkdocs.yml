site_name: squidrouter-py
site_description: Python client for the Squid Router API (Axelar cross-chain swaps/bridge aggregator). Sync + async, Pydantic v2.
repo_url: https://github.com/robertruben98/squidrouter-py
repo_name: robertruben98/squidrouter-py

theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy
  palette:
    - scheme: default
      primary: black
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: false
            members_order: source

nav:
  - Home: index.md
  - API reference: api.md
