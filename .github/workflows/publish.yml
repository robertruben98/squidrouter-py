name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build & publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/squidrouter-py/
    permissions:
      # IMPORTANT: this permission is mandatory for OIDC Trusted Publishing.
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Build distributions
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
